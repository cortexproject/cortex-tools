version: "2"
run:
  build-tags:
    - netgo
    - require_docker
  modules-download-mode: vendor
output:
  formats:
    text:
      path: stdout
      colors: false
linters:
  enable:
    - misspell
    - revive
  settings:
    errcheck:
      exclude-functions:
        - (github.com/go-kit/log.Logger).Log
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/cortexproject/cortex-tools
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
