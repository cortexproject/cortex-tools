run:
  timeout: 10m
  modules-download-mode: vendor
  build-tags:
    - netgo
    - require_docker

output:
  formats:
    - format: line-number

linters:
  enable:
    - goimports
    - revive
    - misspell
    - gofmt

linters-settings:
  errcheck:
    exclude-functions: []
  goimports:
    local-prefixes: "github.com/cortexproject/cortex-tools"
